spring:
  application:
    name: flyapp

  profiles:
    default: localdev

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/flyapp
    username: ${DB_USER:flyuser}
    password: ${DB_PASSWORD:flypass}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        envers:
          do_not_audit_optimistic_locking_field: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8081/realms/flyapp}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/flyapp/protocol/openid-connect/certs}

server:
  servlet:
    context-path: /flyapp

management:
  endpoints:
    web:
      exposure:
        include: health